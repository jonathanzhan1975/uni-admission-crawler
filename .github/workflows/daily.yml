name: Daily Crawl

concurrency:
  group: daily-crawl
  cancel-in-progress: false

on:
  schedule:
    # 03 分而非 :00：避开 GH Actions cron 整点峰值（:00 高度拥塞，常被延迟或丢弃）
    # UTC 01:03 = 北京 09:03，仍在 A1 "09:00 ± 5 分钟" 窗口内
    # 注：GH 官方承认 schedule 在峰值仍可能延迟最多 30-60 分钟，超时不算 SLA 故障
    - cron: "3 1 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install -e .
      - run: python -m crawler.main
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      - name: Commit state
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/state.db
          git diff --cached --quiet || git commit -m "chore: update state $(date -u +%F)"
          git push
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-artifacts
          path: |
            data/raw/
            data/failed/
